<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScaleX - Insights & Blogs</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <span class="logo-icon">⚡</span> ScaleX
    </div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">About Us</a>
      <a href="#" class="active-nav">Blogs</a>
      <a href="#">Contact Us</a>
    </nav>
    <button class="btn-get-started">Get Started</button>
  </header>

  <main class="container">
    <h1 class="main-title">Insights & Blogs</h1>
    
    <div class="filter-container">
      <button class="filter-btn active">All</button>
      <button class="filter-btn">Tech</button>
      <button class="filter-btn">SaaS</button>
      <button class="filter-btn">Marketing</button>
    </div>

    <section class="blog-grid">
      
      <article class="blog-card">
        <div class="image-container">
          <img src="https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&w=600&q=80" alt="Martini Glass">
        </div>
        <div class="card-content">
          <span class="category-badge badge-tech">Tech</span>
          <h2 class="card-title">The Ultimate Guide To SaaS Marketing</h2>
          <span class="card-date">May 23, 2025</span>
        </div>
      </article>

      <article class="blog-card">
        <div class="image-container">
          <img src="https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&w=600&q=80" alt="Green Chair">
        </div>
        <div class="card-content">
          <span class="category-badge badge-saas">SaaS</span>
          <h2 class="card-title">5 Key Trends In SaaS Growth For 2025</h2>
          <span class="card-date">May 23, 2025</span>
        </div>
      </article>

      <article class="blog-card">
        <div class="image-container">
          <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=600&q=80" alt="Cat looking up">
        </div>
        <div class="card-content">
          <span class="category-badge badge-marketing">Marketing</span>
          <h2 class="card-title">How Data-Driven Strategies Are Important</h2>
          <span class="card-date">May 23, 2025</span>
        </div>
      </article>

    </section>
  </main>

</body>
</html>
