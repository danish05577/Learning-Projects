<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Art Work</title>
  <link rel="stylesheet" href="proj1.css">
</head>
<body>

  <div class="dashboard-container">
    <header class="explore-header">
      <h1 class="title">Explore Art Work</h1>
      <a href="#" class="see-all">See All</a>
    </header>

    <main class="art-grid">
      
      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Monocular" alt="Monocular">
        </div>
        <div class="card-info">
          <span class="art-name">Monocular</span>
          <div class="likes-container">
            <span class="likes-count">54.8k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Horns+Mask" alt="Horns Mask">
        </div>
        <div class="card-info">
          <span class="art-name">Horns Mask</span>
          <div class="likes-container">
            <span class="likes-count">32.4k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Light+Moon" alt="Light Moon">
        </div>
        <div class="card-info">
          <span class="art-name">Light Moon</span>
          <div class="likes-container">
            <span class="likes-count">86.6k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Skull+Wire" alt="Skull Wire">
        </div>
        <div class="card-info">
          <span class="art-name">Skull Wire</span>
          <div class="likes-container">
            <span class="likes-count">78.9k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Spiderman" alt="Spiderman">
        </div>
        <div class="card-info">
          <span class="art-name">Spiderman</span>
          <div class="likes-container">
            <span class="likes-count">24.8k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=DeadPool" alt="DeadPool">
        </div>
        <div class="card-info">
          <span class="art-name">DeadPool</span>
          <div class="likes-container">
            <span class="likes-count">59.7k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=White+Eye" alt="White Eye">
        </div>
        <div class="card-info">
          <span class="art-name">White Eye</span>
          <div class="likes-container">
            <span class="likes-count">45.7k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

      <div class="art-card">
        <div class="image-container">
          <img src="https://via.placeholder.com/200/1a1125/ffffff?text=Plastic+Spinal" alt="Plastic Spinal">
        </div>
        <div class="card-info">
          <span class="art-name">Plastic Spinal</span>
          <div class="likes-container">
            <span class="likes-count">98.6k</span>
            <button class="heart-btn" aria-label="Like"></button>
          </div>
        </div>
        <button class="bid-btn">Place Bid</button>
      </div>

    </main>
  </div>

</body>
</html>
